name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # All jobs run in parallel for maximum speed

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Check Documentation Consistency
      run: ./scripts/check-docs-consistency.sh

    # Frontend Linting
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/jwst-frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: frontend/jwst-frontend

    - name: Lint Frontend (ESLint)
      run: npm run lint
      working-directory: frontend/jwst-frontend

    - name: Check Frontend Formatting (Prettier)
      run: npm run format:check
      working-directory: frontend/jwst-frontend

    # Processing Engine Linting
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Ruff
      run: pip install ruff

    - name: Lint Processing Engine (Ruff)
      run: ruff check .
      working-directory: processing-engine

    - name: Check Processing Engine Formatting (Ruff)
      run: ruff format --check .
      working-directory: processing-engine

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    # No 'needs' - runs in parallel with other jobs

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    # Cache NuGet packages
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Backend Dependencies
      run: dotnet restore backend/JwstDataAnalysis.sln

    - name: Build Backend
      run: dotnet build backend/JwstDataAnalysis.sln --no-restore

    - name: Test Backend
      run: >-
        dotnet test backend/JwstDataAnalysis.API.Tests --no-build --verbosity normal
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:ThresholdType=line
        /p:Threshold=40
        /p:Exclude="[*]Microsoft.AspNetCore.OpenApi.Generated.*%2c[*]System.Text.RegularExpressions.Generated.*%2c[*]System.Runtime.CompilerServices.*%2c[*]Program%2c[*]*.LoggerMessage"
        /p:ExcludeByAttribute="System.CodeDom.Compiler.GeneratedCodeAttribute"
        /p:ExcludeByFile="**/obj/**/*.cs%2c**/*.g.cs"

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    # No 'needs' - runs in parallel with other jobs

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/jwst-frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: frontend/jwst-frontend

    - name: Build Frontend
      run: npm run build
      working-directory: frontend/jwst-frontend

    - name: Test Frontend (Unit Tests)
      run: npm test
      working-directory: frontend/jwst-frontend

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    # No 'needs' - runs in parallel with other jobs

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: processing-engine/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      working-directory: processing-engine

    - name: Test Processing Engine
      run: pytest --cov-fail-under=60
      working-directory: processing-engine

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # No 'needs' - runs in parallel with other jobs

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./backend/JwstDataAnalysis.API
        push: false
        tags: jwst-backend:test
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./frontend/jwst-frontend
        file: ./frontend/jwst-frontend/Dockerfile.dev
        push: false
        tags: jwst-frontend:test
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

    - name: Build Processing Engine Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./processing-engine
        push: false
        tags: jwst-processing:test
        cache-from: type=gha,scope=processing
        cache-to: type=gha,mode=max,scope=processing

    - name: Build MAST Proxy Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./processing-engine
        file: ./processing-engine/Dockerfile.mast
        push: false
        tags: jwst-mast-proxy:test
        cache-from: type=gha,scope=mast-proxy
        cache-to: type=gha,mode=max,scope=mast-proxy

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Pre-build Docker Images (from GHA cache)
      run: |
        docker buildx build \
          --load \
          --cache-from type=gha,scope=backend \
          -t docker-backend \
          -f backend/JwstDataAnalysis.API/Dockerfile \
          backend/JwstDataAnalysis.API

        docker buildx build \
          --load \
          --cache-from type=gha,scope=frontend \
          -t docker-frontend \
          -f frontend/jwst-frontend/Dockerfile.dev \
          frontend/jwst-frontend

        docker buildx build \
          --load \
          --cache-from type=gha,scope=processing \
          -t docker-processing-engine \
          -f processing-engine/Dockerfile \
          processing-engine

        docker buildx build \
          --load \
          --cache-from type=gha,scope=mast-proxy \
          -t docker-mast-proxy \
          -f processing-engine/Dockerfile.mast \
          processing-engine

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/jwst-frontend/package-lock.json

    - name: Resolve Playwright version
      id: playwright-version
      run: |
        VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      working-directory: frontend/jwst-frontend

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: frontend/jwst-frontend

    - name: Install Playwright Browsers (Chromium only)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium
      working-directory: frontend/jwst-frontend

    - name: Prepare Data Directories
      run: |
        mkdir -p data/mast
        cp -r tests/fixtures/e2e/mast/* data/mast/
        chmod -R 777 data

    - name: Start Docker Stack
      run: |
        cp docker/.env.example docker/.env
        docker compose -f docker/docker-compose.yml up -d --no-build

    - name: Wait for Services
      run: |
        echo "Waiting for services to be ready..."
        for i in $(seq 1 60); do
          if curl -sf http://localhost:5001/api/health > /dev/null 2>&1 && \
             curl -sf http://localhost:3000 > /dev/null 2>&1; then
            echo "Services are ready!"
            break
          fi
          if [ "$i" -eq 60 ]; then
            echo "Services failed to start within 120 seconds"
            docker compose -f docker/docker-compose.yml logs
            exit 1
          fi
          echo "Attempt $i/60 - waiting 2s..."
          sleep 2
        done

    - name: Seed MongoDB with E2E fixture data
      run: |
        docker cp tests/fixtures/e2e/seed-data.json jwst-mongodb:/tmp/seed-data.json
        docker exec jwst-mongodb mongoimport \
          --uri="mongodb://admin:changeme_use_strong_password@localhost:27017/jwst_data_analysis?authSource=admin" \
          --collection=jwst_data \
          --file=/tmp/seed-data.json \
          --jsonArray

    - name: Run Playwright Tests (Chromium)
      run: npx playwright test --project=chromium
      working-directory: frontend/jwst-frontend

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/jwst-frontend/playwright-report/
        retention-days: 14

    - name: Stop Docker Stack
      if: always()
      run: docker compose -f docker/docker-compose.yml down
