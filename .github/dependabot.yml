version: 2

# All ecosystems share the same conventional-commit prefix so PR titles
# satisfy the `Validate PR Standards` workflow without manual editing.
# (NuGet does NOT default to a conventional prefix — see #1126.)

updates:
  # NPM (Frontend)
  - package-ecosystem: "npm"
    directory: "/frontend/jwst-frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "frontend"
    # Group related packages so they always move together. Without this,
    # Dependabot opens separate PRs for `react` and `react-dom`, which breaks
    # because the two MUST be at the exact same version (otherwise every
    # test that touches react-dom fails with "Incompatible React versions").
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # NuGet (.NET Backend)
  - package-ecosystem: "nuget"
    directory: "/backend/JwstDataAnalysis.API"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "backend"

  # Pip (Python Processing Engine)
  - package-ecosystem: "pip"
    directory: "/processing-engine"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "processing-engine"

  # Docker
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "ci"
