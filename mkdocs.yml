site_name: JWST Data Analysis Docs
docs_dir: docs
theme:
  name: material
  palette: 
    scheme: slate
    primary: deep purple
    accent: teal
  features:
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - tags
  - blog:
      blog_dir: blog
      post_date_format: long
      archive_date_format: MMMM yyyy

markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Dev Journal:
    - blog/index.md
  - Documentation:
    - Tech Debt: tech-debt.md
    - Bugs: bugs.md
    - Architecture:
      - Overview: architecture/index.md
      - System Overview: architecture/system-overview.md
      - Data Flows:
        - Local Upload Flow: architecture/local-upload-flow.md
        - MAST Import Flow: architecture/mast-import-flow.md
        - Discovery & Recipe Flow: architecture/discovery-recipe-flow.md
        - GuidedCreate Flow: architecture/guidedcreate-flow.md
        - Authentication Flow: architecture/authentication-flow.md
        - Security & Authorization Model: architecture/security-model.md
        - Job Queue & SignalR: architecture/job-queue-signalr.md
      - Data Lineage: architecture/data-lineage.md
      - Frontend Architecture: architecture/frontend-architecture.md
      - Storage Layer: architecture/storage-layer.md
      - MongoDB Documents: architecture/mongodb-document.md
      - Backend Service Layer: architecture/backend-service-layer.md
      - Processing Engine: architecture/processing-engine.md
      - Docker Compose: architecture/docker-compose.md
    - Development Plan: development-plan.md
    - Setup Guide: setup-guide.md
    - Key Files Reference: key-files.md
    - Quick Reference: quick-reference.md
    - MAST Usage: mast-usage.md
    - Feature Ideas: feature-ideas.md
    - Idea Capture Guide: idea-capture-guide.md
    - Security Audits:
      - March 2026: audits/2026-03-02-git-history-audit.md
      - January 2026: audits/2026-01-31-git-history-audit.md
    - Standards:
      - Overview: standards/project-overview.md
      - Backend Development: standards/backend-development.md
      - Frontend Development: standards/frontend-development.md
      - Processing Engine: standards/processing-engine.md
      - Database Models: standards/database-models.md
      - Docker Deployment: standards/docker-deployment.md
      - Development Workflow: standards/development-workflow.md
    - Plans:
      - Design Docs:
        - Guided Discovery Experience: plans/design/guided-discovery-experience.md
        - Color Mapping Research: plans/design/color-mapping-research.md
        - Job Queue & WebSocket Progress: plans/design/job-queue-websocket-progress.md
      - Exploration:
        - Processing Engine Scaling: plans/exploration/processing-engine-scaling.md
        - Cloud Storage Evaluation: plans/exploration/cloud-storage-evaluation.md
        - Desktop Requirements: plans/exploration/desktop-requirements.md
