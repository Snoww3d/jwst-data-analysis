# Staging overrides for AWS EC2 deployment (HTTP only, no SSL)
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and set MONGO_ROOT_PASSWORD to a strong value
#   2. Set CORS_ALLOWED_ORIGINS to http://<your-ec2-public-ip>
#
# This override:
#   - Uses the production frontend Dockerfile (built static assets + nginx)
#   - Exposes port 80 on all interfaces (public access)
#   - Uses nginx-staging.conf (port 80, no SSL)
#   - Sets backend to Production mode with forwarded headers
#   - Hides MongoDB and processing-engine ports from external access
#   - Excludes docs and SeaweedFS services (not needed on staging)

services:
  mongodb:
    # MongoDB not exposed externally
    ports: []

  backend:
    # Bind to all interfaces so nginx can proxy — but don't expose to host
    ports: []
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env to http://<your-ec2-ip>}
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true

  frontend:
    build:
      context: ../frontend/jwst-frontend
      dockerfile: Dockerfile
      args:
        # Empty string = use same-origin requests (nginx proxies /api to backend)
        VITE_API_URL: ""
    container_name: jwst-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:3000"
    volumes:
      - ../frontend/jwst-frontend/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - jwst-network

  mast-proxy:
    # MAST proxy not exposed externally
    ports: []

  processing-engine:
    # Processing engine not exposed externally
    ports: []

  # Disable services not needed on staging
  docs:
    profiles:
      - disabled
