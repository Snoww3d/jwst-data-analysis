# Development overrides (auto-loaded by docker compose)
# This file adds development conveniences like exposed ports and hot reload

services:
  mongodb:
    ports:
      - "127.0.0.1:27017:27017"  # Expose MongoDB for local tools (localhost only)

  backend:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - Seeding__Users__0__Password=${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env}
      - Seeding__Users__1__Password=${SEED_DEMO_PASSWORD:?Set SEED_DEMO_PASSWORD in .env}

  frontend:
    volumes:
      - ../frontend/jwst-frontend:/app
      - frontend_node_modules:/app/node_modules

  mast-proxy:
    ports:
      - "127.0.0.1:8002:8000"  # Expose MAST proxy for debugging (localhost only)

  processing-engine:
    build:
      args:
        INSTALL_DEV: "true"  # local image ships pytest/ruff for `docker exec jwst-processing pytest` (#1468)
    ports:
      - "127.0.0.1:8000:8000"  # Expose processing engine for debugging (localhost only)

volumes:
  frontend_node_modules:
