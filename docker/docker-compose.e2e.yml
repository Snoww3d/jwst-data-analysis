# E2E test override — replaces the real processing engine with a lightweight
# mock server that returns canned responses in <1ms. This makes E2E tests
# deterministic and eliminates Docker startup flakiness.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#
# The mock covers all processing engine routes (composite, mosaic, analysis,
# semantic, discovery, mast) with valid but minimal responses.

services:
  backend:
    environment:
      # Disable rate limiting in E2E — parallel workers registering users in
      # bulk will always exceed the per-hour registration limit, and the Docker
      # NAT layer presents IPv4-mapped IPv6 addresses that don't match the IPv4
      # CIDR entries in the development IP whitelist.
      - IpRateLimiting__EnableEndpointRateLimiting=false

  processing-engine:
    image: docker-mock-processing-engine
    # The calibration UI calls the engine directly from the browser
    # (VITE_ENGINE_URL defaults to localhost:8000); the base compose does not
    # publish this port — only the dev override does — so E2E must.
    ports:
      - "127.0.0.1:8000:8000"
    build:
      context: ../tests/mock-processing-engine
      dockerfile: Dockerfile
    container_name: jwst-processing
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 1s
